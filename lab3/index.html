<!DOCTYPE html>
<html>

<head>
</head>

<body>
    <h3>SVG Shapes with D3</h3>
    <svg width="760" height="700">
        <g transform="translate(70, 70)">
            <circle/>
            <circle/>
            <circle/>
            <circle/>
            <circle/>
        </g>
    </svg>

    <h1>Introduction to SVG</h1>
    <h3>Five Circles Stacked</h3>
    <svg width="600" height="250">
        <circle cx="60" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
        <circle cx="60" cy="80" r="40" stroke="green" stroke-width="4" fill="yellow" />
        <circle cx="60" cy="110" r="40" stroke="green" stroke-width="4" fill="yellow" />
        <circle cx="60" cy="140" r="40" stroke="green" stroke-width="4" fill="yellow" />
        <circle cx="60" cy="170" r="40" stroke="green" stroke-width="4" fill="yellow" />
    </svg>

    <h3>Five Rectangles Stacked</h3>
    <svg width="300" height="250">
        <rect width="200" height="100" x="10" y="10" rx="20" ry="20" fill="blue" />
        <rect width="200" height="100" x="10" y="40" rx="20" ry="20" fill="green" />
        <rect width="200" height="100" x="10" y="70" rx="20" ry="20" fill="yellow" />
        <rect width="200" height="100" x="10" y="110" rx="20" ry="20" fill="red" />
        <rect width="200" height="100" x="10" y="140" rx="20" ry="20" fill="orange" />
    </svg>

    <h3>Five Diffrent Shapes Stacked</h3>
    <svg width="400" height="400">
        <circle cx="50" cy="50" r="30" stroke="black" stroke-width="2" fill="red" />
        <rect width="60" height="60" x="20" y="90" fill="blue" />
        <ellipse cx="50" cy="200" rx="30" ry="20" fill="green" />
        <line x1="20" y1="250" x2="80" y2="300" stroke="purple" stroke-width="4" />
        <polygon points="50,320 20,370 80,370" fill="orange" />
    </svg>


    <script type="module" src="main.js"></script>
</body>

</html>
